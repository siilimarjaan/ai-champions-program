<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Champions Program</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; }
    #gate {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #111;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    }
    #gate-box {
      text-align: center; padding: 48px 40px; max-width: 380px; width: 100%;
    }
    #gate-box h1 {
      color: #fff; font-size: 28px; font-weight: 800; margin: 0 0 6px;
      font-family: 'Outfit', sans-serif;
    }
    #gate-box p {
      color: #888; font-size: 14px; margin: 0 0 32px;
      font-family: 'Outfit', sans-serif;
    }
    #gate-box .siili {
      color: #d4511e; font-size: 11px; letter-spacing: 2.5px;
      font-family: 'JetBrains Mono', monospace; font-weight: 600;
      margin-bottom: 20px;
    }
    #gate-box input {
      width: 100%; padding: 14px 16px; font-size: 15px;
      border: 2px solid #333; border-radius: 8px;
      background: #1a1a1a; color: #fff; outline: none;
      font-family: 'JetBrains Mono', monospace;
      box-sizing: border-box; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    #gate-box input:focus { border-color: #d4511e; }
    #gate-box input::placeholder { color: #555; }
    #gate-box button {
      width: 100%; padding: 14px; font-size: 14px; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer;
      background: #d4511e; color: #fff;
      font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    #gate-box button:hover { background: #b8441a; }
    #gate-box .error {
      color: #e05050; font-size: 13px; margin-top: 12px;
      font-family: 'Outfit', sans-serif; display: none;
    }
    #root { display: none; }
  </style>

<body>
  <div id="gate">
    <div id="gate-box">
      <div class="siili" style="display:none"></div>
      <h1>AI Champions Program</h1>
      <p>Enter password to continue</p>
      <input type="password" id="pw" placeholder="Password" autofocus />
      <button onclick="checkPw()">Enter</button>
      <div class="error" id="err">Incorrect password</div>
    </div>
  </div>
  <div id="root"></div>
  <script>
    async function hashPw(pw) {
      const enc = new TextEncoder().encode(pw);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    async function checkPw() {
      const pw = document.getElementById('pw').value;
      const hash = await hashPw(pw);
      if (hash === '8563557a1e3928318f5d062cf73a00908e414bde357f9e4d0433ffad8223877c') {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('root').style.display = 'block';
        sessionStorage.setItem('ai-champions-auth', '1');
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pw').style.borderColor = '#e05050';
        document.getElementById('pw').value = '';
        setTimeout(() => {
          document.getElementById('err').style.display = 'none';
          document.getElementById('pw').style.borderColor = '#333';
        }, 2000);
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('gate').style.display !== 'none') checkPw(); });
    if (sessionStorage.getItem('ai-champions-auth') === '1') {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('root').style.display = 'block';
    }
  </script>
</body>
